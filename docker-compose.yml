services:
  rtsp-server:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "8889:8889" # WebRTC
      - "8888:8888" # HLS
      - "9997:9997" # API
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT
      - "9001:9001" # WebSockets
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build: ./backend
    container_name: stream-backend
    restart: unless-stopped
    depends_on:
      - mqtt-broker
      - rtsp-server
    environment:
      - MQTT_URL=mqtt://mqtt-broker:1883
      - RTSP_SERVER=rtsp://rtsp-server:8554
      - VIDEO_DIR=/app/videos
      - DB_PATH=/app/data/database.sqlite
      - PORT=3000
    volumes:
      - ./videos:/app/videos
      - ./data:/app/data
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: stream-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
